name: Publish Python Package

on:
  workflow_run:
    workflows: ["Validate Release"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: false
        default: "main"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-tag:
    name: Build and Tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref || 'main' }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install version parser
        run: python -m pip install packaging

      - name: Get current version
        id: current
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Get previous version
        id: previous
        run: |
          git show HEAD~1:pyproject.toml > /tmp/previous-pyproject.toml 2>/dev/null || true
          PREV_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          path = Path("/tmp/previous-pyproject.toml")
          if not path.exists() or not path.read_bytes():
              print("0.0.0")
          else:
              print(tomllib.loads(path.read_text())["project"]["version"])
          PY
          )
          echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Previous version: $PREV_VERSION"

      - name: Validate version bump
        run: |
          python <<'PY'
          from packaging.version import parse as parse_version
          import os
          import sys

          current = "${{ steps.current.outputs.version }}"
          previous = "${{ steps.previous.outputs.version }}"
          event_name = os.environ["GITHUB_EVENT_NAME"]

          print(f"Comparing: {previous} -> {current}")

          if event_name != "workflow_dispatch" and parse_version(current) <= parse_version(previous):
              print("Version must increase for a release")
              sys.exit(1)
          PY

      - name: Validate tag is new
        run: |
          VERSION="v${{ steps.current.outputs.version }}"
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: |
          uv lock
          uv sync --locked --group dev

      - name: Build package
        run: uv build

      - name: Check package
        run: uv run --locked twine check dist/*

      - name: Create and push tag
        run: |
          VERSION="v${{ steps.current.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release ${{ steps.current.outputs.version }}"
          git push origin "$VERSION"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-and-tag
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref || 'main' }}

      - name: Get version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if [[ "$VERSION" =~ (a|b|rc)[0-9]+$ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Release v${{ steps.version.outputs.value }}
          body: |
            ## fastkokoro v${{ steps.version.outputs.value }}

            See [CHANGELOG.md](https://github.com/msgflux/fastkokoro/blob/main/CHANGELOG.md) for details.

            ```bash
            pip install fastkokoro==${{ steps.version.outputs.value }}
            ```
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value }}
