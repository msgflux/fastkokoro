name: Publish Docker Images

on:
  workflow_run:
    workflows: ["Publish Python Package"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            alias: cpu
            dockerfile: docker/Dockerfile.cpu
          - variant: gpu-cuda12.6-cudnn9
            alias: gpu
            dockerfile: docker/Dockerfile.gpu
          - variant: gpu-cuda11.8-cudnn8
            alias: gpu-legacy
            dockerfile: docker/Dockerfile.gpu-legacy
          - variant: tensorrt-25.06
            alias: tensorrt
            dockerfile: docker/Dockerfile.tensorrt

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read package version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )
          MAJOR_MINOR="${VERSION%.*}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fastkokoro
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.variant }}
            type=raw,value=latest-${{ matrix.variant }}
            type=raw,value=${{ steps.version.outputs.value }}-${{ matrix.variant }}
            type=raw,value=${{ steps.version.outputs.major_minor }}-${{ matrix.variant }}
            type=raw,value=${{ matrix.alias }}
            type=raw,value=latest-${{ matrix.alias }}
            type=raw,value=${{ steps.version.outputs.value }}-${{ matrix.alias }}
            type=raw,value=${{ steps.version.outputs.major_minor }}-${{ matrix.alias }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.variant }}
